<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Privacidade e Cookies</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#e5e7eb;
padding:10px;
}

/* CONTAINER */
.cookie-box{
width:100%;
max-width:360px;
margin:0 auto;
background:#fff;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
overflow:hidden;
}

/* HEADER */
.header{
background:#0f172a;
color:#fff;
padding:12px;
display:flex;
align-items:center;
gap:8px;
}

.icon{
width:32px;
height:32px;
border-radius:6px;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

/* TITULO */
.header h1{
font-size:14px;
}

.header p{
font-size:10px;
opacity:.8;
}

/* CONTENT */
.content{
padding:12px;
}

/* BOTÕES NO TOPO */
.buttons{
display:flex;
flex-direction:column;
gap:6px;
margin-bottom:12px;
}

.btn{
width:100%;
padding:12px;
border-radius:8px;
font-size:12px;
font-weight:600;
border:none;
cursor:pointer;
}

/* CORES */
.accept{
background:#2563eb;
color:#fff;
}

.reject{
background:#e5e7eb;
}

.custom{
background:#fff;
border:1px solid #cbd5f5;
color:#2563eb;
}

/* TEXTO */
.text{
font-size:11px;
color:#475569;
margin-bottom:10px;
text-align:center;
}

/* CARDS */
.cards{
display:flex;
flex-direction:column;
gap:6px;
margin-bottom:10px;
}

.card{
padding:10px;
border-radius:8px;
background:#f8fafc;
border:1px solid #e2e8f0;
}

.card h3{
font-size:11px;
margin-bottom:2px;
}

.card p{
font-size:9px;
color:#64748b;
}

/* FOOTER */
.footer{
text-align:center;
font-size:9px;
color:#64748b;
}

.footer a{
color:#2563eb;
text-decoration:none;
}

</style>
</head>

<body>

<div class="cookie-box">

<div class="header">
<div class="icon">🔐</div>
<div>
<h1>Privacidade e Cookies</h1>
<p>Controle sua experiência</p>
</div>
</div>

<div class="content">

<!-- BOTÕES -->
<div class="buttons">
<button class="btn accept" onclick="aceitar()">Aceitar e Continuar</button>
<button class="btn reject" onclick="rejeitar()">Rejeitar</button>
<button class="btn custom" onclick="personalizar()">Configurar</button>
</div>

<div class="text">
Usamos cookies para melhorar sua navegação e experiência.
</div>

<div class="cards">

<div class="card">
<h3>🔒 Essenciais</h3>
<p>Funcionamento do site</p>
</div>

<div class="card">
<h3>📊 Desempenho</h3>
<p>Melhoram sua experiência</p>
</div>

</div>

<div class="footer">
Veja nossa <a href="#">Política</a>
</div>

</div>

</div>

<script>
const LINK = "https://fanciful-wisp-97d157.netlify.app/"

function aceitar(){
localStorage.setItem("cookies","accepted")
location.href = LINK
}

function rejeitar(){
localStorage.setItem("cookies","rejected")
location.href = LINK
}

function personalizar(){
localStorage.setItem("cookies","custom")
location.href = LINK
}
</script>

</body>
</html>
